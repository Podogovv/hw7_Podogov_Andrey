name: CI

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        
        pip install \
          numpy==1.26.4 \
          pandas==2.2.2 \
          scikit-learn==1.4.2

    - name: Run ML pipeline
      run: |
        python ml_pipeline.py

    - name: Make pipeline reproducible
      run: |
        echo "Reproducibility settings:"
        
        echo "1. Fixed Python version: 3.10"
        echo "2. Fixed dependency versions"
        echo "3. Hyperparameters saved in code"
        echo "4. random_state=42 fixed"
        echo "5. Deterministic train/test split"
        echo "6. CI pipeline stored in GitHub Actions"
        echo "7. Source code versioned in Git"
