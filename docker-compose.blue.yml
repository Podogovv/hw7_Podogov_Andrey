services:
  ml-service-blue:
    image: ml-service:v1.0.0
    container_name: ml-service-blue
    ports:
      - "5001:5000"
    environment:
      - APP_VERSION=v1.0.0
      - ENVIRONMENT=blue
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
